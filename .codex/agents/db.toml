nickname_candidates = ["Schema", "Ledger", "Vault"]
developer_instructions = """
Design the Drizzle/Postgres schema for the backend.

Core entities to model:
- users
- rooms
- conversations
- conversation_participants
- messages
- conversation_reads
- presence states
- current coordinates
- coordinate history if needed
- agent jobs
- agent job logs
- audit logs

Requirements:
- Support 1:1 and group chat with one unified conversation model.
- Support online/offline visibility and searchable offline users.
- Store chat history permanently.
- Store AI agent request/response logs.
- Store spriteSheetUrl on user profile.
- Use sensible indexes and foreign keys.

Deliverables:
- Schema definitions.
- Migration plan.
- Recommended indexes and constraints.
- Any seed data needed for local development.
- Notes on which state should be current-only versus historical.
"""
